<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Al-Kendi Tech Portal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#8B5CF6',
                            purpleDark: '#6D28D9',
                            purpleGlow: 'rgba(139, 92, 246, 0.15)',
                            darkBg: '#09090E',
                            darkCard: '#12121A',
                            neonRed: '#EF4444',
                            neonGreen: '#10B981'
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts (Cairo & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Tech Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background-color: #09090E;
        }
        .glow-shadow {
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Ambient Background Light Effects -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-brand-purple/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-fuchsia-500/5 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Core Login Card Container -->
    <div class="w-full max-w-md bg-brand-darkCard/80 backdrop-blur-xl border border-white/5 rounded-3xl p-8 sm:p-10 glow-shadow relative z-10 transition-all duration-300">
        
        <!-- Tech Shield Header Indicator -->
        <div class="text-center space-y-4 mb-8">
            <div class="w-16 h-16 rounded-2xl bg-brand-purple/10 border border-brand-purple/30 flex items-center justify-center text-2xl text-brand-purple mx-auto shadow-lg shadow-brand-purple/15">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-white">بوابة الأدمن الآمنة</h1>
                <p class="text-xs text-gray-400 mt-1.5">يرجى إدخال بيانات الاعتماد الموثقة للولوج إلى لوحة التحكم</p>
            </div>
        </div>

        <!-- Authorization Form -->
        <form id="loginForm" onsubmit="handleSecureLogin(event)" class="space-y-6">
            
            <!-- Email Input Block -->
            <div class="space-y-2">
                <label for="email" class="block text-xs font-semibold text-gray-400">البريد الإلكتروني للأدمن</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-4 flex items-center text-gray-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required placeholder="admin@alkendi.me" class="w-full pr-11 pl-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-brand-purple focus:ring-1 focus:ring-brand-purple transition-all placeholder-gray-600">
                </div>
            </div>

            <!-- Password Input Block -->
            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label for="password" class="block text-xs font-semibold text-gray-400">كلمة المرور المشفرة</label>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 right-4 flex items-center text-gray-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <!-- Native Eye Vector icon to toggle visibility safely -->
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 left-4 flex items-center text-gray-500 hover:text-white transition-colors" aria-label="عرض كلمة المرور">
                        <i id="eyeIcon" class="fa-solid fa-eye-slash"></i>
                    </button>
                    <input type="password" id="password" required placeholder="••••••••••••" class="w-full pr-11 pl-12 py-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:outline-none focus:border-brand-purple focus:ring-1 focus:ring-brand-purple transition-all placeholder-gray-600">
                </div>
            </div>

            <!-- Submit Button with Safe Vector Icon -->
            <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-brand-purple to-brand-purpleDark text-white font-bold text-sm hover:opacity-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-brand-purple/20">
                <span>تخويل الدخول الآمن</span> <i class="fa-solid fa-key-skeleton"></i>
            </button>
        </form>

        <!-- Footer indicator link -->
        <div class="text-center mt-8 pt-6 border-t border-white/5">
            <a href="/index.html" class="text-xs text-gray-500 hover:text-brand-purple transition-colors flex items-center justify-center gap-1.5 font-semibold">
                <i class="fa-solid fa-arrow-right"></i> الرجوع للموقع الرئيسي
            </a>
        </div>
    </div>

    <!-- Custom Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 left-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // Toggle plain password text visibility securely
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            } else {
                pwdInput.type = 'password';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            }
        }

        // AJAX Secure Login Request Handler
        async function handleSecureLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            // Apply loading state to prevent double submission
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>جاري التحقق والتشفير...</span> <i class="fa-solid fa-circle-notch animate-spin"></i>`;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "فشلت عملية المصادقة");
                }

                showToast(result.message, "success");
                
                // Successful Authorization redirecting to the administrative deck
                setTimeout(() => {
                    window.location.href = '/admin.html';
                }, 1500);

            } catch (err) {
                showToast(err.message, "error");
                // Restore submit button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>تخويل الدخول الآمن</span> <i class="fa-solid fa-key-skeleton"></i>`;
            }
        }

        // Custom Toast Manager
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = "flex items-center gap-3 px-5 py-4 rounded-2xl bg-brand-darkCard border border-white/10 shadow-2xl text-sm text-white pointer-events-auto transition-all duration-300 opacity-0 -translate-y-2 max-w-sm";
            
            const icon = type === 'success' ? 
                '<i class="fa-solid fa-circle-check text-brand-neonGreen text-lg"></i>' : 
                '<i class="fa-solid fa-circle-exclamation text-brand-neonRed text-lg"></i>';
                
            toast.innerHTML = `
                ${icon}
                <div class="text-right">
                    <p class="font-bold text-xs">${message}</p>
                </div>
            `;
            
            container.appendChild(toast);
            
            // Fade-In trigger
            setTimeout(() => {
                toast.classList.remove('opacity-0', '-translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 10);
            
            // Self Destruct trigger
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                toast.classList.remove('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 5000);
        }
    </script>
</body>
</html>
